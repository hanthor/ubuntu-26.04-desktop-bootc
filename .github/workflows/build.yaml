name: Build and Publish

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Rebuild weekly to pick up upstream package updates
    - cron: "0 2 * * TUE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ubuntu-26.04-desktop-bootc
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Build image
        run: sudo $(which just) build

      # ── Structure tests — run on every PR and push ─────────────────────────
      # Verifies filesystem layout, initramfs, ZFS units, masked sockets, etc.
      # Fast (~5s). Reproducible locally with: just test-structure
      - name: Run image structure tests
        run: sudo $(which just) test-structure

      # ── Boot smoke test — amd64 non-PR builds only ─────────────────────────
      # Creates a real disk image via bootc install and boots it in QEMU KVM,
      # verifying the system reaches a login prompt within 4 minutes.
      # Skipped on PRs to keep review feedback fast; runs on merge to main
      # and on the weekly schedule so regressions are caught quickly.
      # Reproducible locally with: just generate-bootable-image && just test-boot

      - name: Enable KVM
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU + OVMF
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request'
        run: sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf

      - name: Generate bootable disk image
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request'
        run: sudo BUILD_BASE_DIR=/var/tmp $(which just) generate-bootable-image

      - name: Boot smoke test
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request'
        run: sudo BUILD_BASE_DIR=/var/tmp $(which just) test-boot

      # ── Publish ────────────────────────────────────────────────────────────

      - name: Rechunk image
        run: sudo $(which just) rechunk

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login \
            -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        id: push
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -x
          for i in 1 2 3; do
            sudo podman push \
              --digestfile=/tmp/digestfile \
              "${IMAGE_NAME}:latest" \
              "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest-${PLATFORM}" && break \
              || sleep $((5 * i))
          done
          echo "digest=$(< /tmp/digestfile)" >> "${GITHUB_OUTPUT}"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign -y \
            --new-bundle-format=false \
            --use-signing-config=false \
            --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Save digest artifact
        if: github.event_name != 'pull_request'
        env:
          PLATFORM: ${{ matrix.platform }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          echo "${DIGEST}" > "/tmp/digests/${PLATFORM}.txt"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform }}
          path: /tmp/digests/*.txt
          retention-days: 1

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    container:
      image: docker.io/library/alpine:latest
      options: --privileged
    steps:
      - name: Install tools
        run: apk add bash coreutils podman

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | podman login \
            -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Create and push manifest
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -x
          TARGET="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          podman manifest create "${TARGET}"
          for digest_file in /tmp/digests/*.txt; do
            PLATFORM="$(basename "${digest_file}" .txt)"
            DIGEST="$(cat "${digest_file}")"
            podman manifest add "${TARGET}" "${TARGET}@${DIGEST}" --arch "${PLATFORM}"
          done
          DATE="$(date -u +%Y%m%d)"
          podman manifest push --all=false "${TARGET}" "${TARGET}:latest"
          podman manifest push --all=false "${TARGET}" "${TARGET}:${DATE}"
