name: Build and Publish

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Rebuild weekly to pick up upstream package updates
    - cron: "0 2 * * TUE"
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant (latest or hotfix)'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - hotfix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ubuntu-26.04-desktop-bootc
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Determine build variant
        id: variant
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_variant }}" == "hotfix" ]]; then
            echo "cmd=build-hotfix" >> $GITHUB_OUTPUT
            echo "tag=hotfix" >> $GITHUB_OUTPUT
          else
            echo "cmd=build" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: sudo $(which just) ${{ steps.variant.outputs.cmd }}
        env:
          PODMAN_EXTRA_ARGS: --platform linux/${{ matrix.platform }}
          BUILD_IMAGE_TAG: ${{ steps.variant.outputs.tag }}

      - name: Run image structure tests
        if: steps.variant.outputs.tag == 'latest'
        run: sudo $(which just) test-structure

      - name: Enable KVM
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request' && steps.variant.outputs.tag == 'latest'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU + OVMF
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request' && steps.variant.outputs.tag == 'latest'
        run: sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf

      - name: Generate bootable disk image
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request' && steps.variant.outputs.tag == 'latest'
        run: sudo JUST_BIN=$(which just) BUILD_BASE_DIR=/var/tmp $(which just) generate-bootable-image

      - name: Boot smoke test
        if: matrix.platform == 'amd64' && github.event_name != 'pull_request' && steps.variant.outputs.tag == 'latest'
        run: sudo BUILD_BASE_DIR=/var/tmp $(which just) test-boot

      - name: Rechunk image
        run: sudo $(which just) rechunk

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login \
            -u "oauth2accesstoken" --password-stdin ghcr.io

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        id: push
        env:
          PLATFORM: ${{ matrix.platform }}
          BUILD_TAG: ${{ steps.variant.outputs.tag }}
        run: |
          set -x
          for i in 1 2 3; do
            sudo podman push \
              --digestfile=/tmp/digestfile \
              "${IMAGE_NAME}:${BUILD_TAG}" \
              "${IMAGE_REGISTRY}/${IMAGE_NAME}:${BUILD_TAG}-${PLATFORM}" && break \
              || sleep $((5 * i))
          done
          echo "digest=$(< /tmp/digestfile)" >> "${GITHUB_OUTPUT}"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign -y \
            --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Save digest artifact
        if: github.event_name != 'pull_request'
        env:
          PLATFORM: ${{ matrix.platform }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          echo "${DIGEST}" > "/tmp/digests/${PLATFORM}.txt"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform }}
          path: /tmp/digests/*.txt
          retention-days: 1

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    container:
      image: docker.io/library/alpine:latest
      options: --privileged
    steps:
      - name: Determine manifest tag
        id: manifest_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_variant }}" == "hotfix" ]]; then
            echo "tag=hotfix" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install tools
        run: |
          apk add bash coreutils podman
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | podman login \
            -u "oauth2accesstoken" --password-stdin ghcr.io

      - name: Create and push manifest
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          MANIFEST_TAG: ${{ steps.manifest_tag.outputs.tag }}
        run: |
          set -x
          TARGET="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          DATE="$(date -u +%Y%m%d)"
          podman manifest create "${TARGET}"
          for digest_file in /tmp/digests/*.txt; do
            PLATFORM="$(basename "${digest_file}" .txt)"
            DIGEST="$(cat "${digest_file}")"
            podman manifest add "${TARGET}" "${TARGET}@${DIGEST}" --arch "${PLATFORM}"
          done
          podman manifest push --all=false "${TARGET}" "${TARGET}:${MANIFEST_TAG}"
          # Also push dated tag for latest builds
          if [[ "${MANIFEST_TAG}" == "latest" ]]; then
            podman manifest push --all=false "${TARGET}" "${TARGET}:${DATE}"
          fi
